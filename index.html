<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lana's Salon - Chat & Book</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="max-w-md mx-auto mt-6 bg-white shadow-2xl rounded-3xl overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-pink-600 to-rose-500 text-white p-5">
      <div class="flex items-center gap-3">
        <img src="https://via.placeholder.com/60" class="w-14 h-14 rounded-full border-2 border-white" alt="Lana">
        <div>
          <h1 class="text-xl font-bold">Lana's Salon</h1>
          <p class="text-sm opacity-90">Plano, TX • AI Assistant</p>
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat" class="h-[520px] overflow-y-auto p-4 space-y-4 bg-gray-50"></div>

    <!-- Quick Action Buttons -->
    <div class="p-3 border-t bg-white flex gap-2">
      <button onclick="quickAction('book')" 
              class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-2xl font-medium">
        📅 Book Appointment
      </button>
      <button onclick="quickReply('What services do you offer?')" 
              class="flex-1 bg-gray-100 hover:bg-gray-200 py-3 rounded-2xl font-medium">
        Services
      </button>
    </div>

    <!-- Input -->
    <div class="p-4 border-t bg-white">
      <div class="flex gap-2">
        <input type="text" id="userInput" 
               class="flex-1 border rounded-3xl px-5 py-3 focus:outline-none focus:border-pink-500"
               placeholder="Type your message..." 
               onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" 
                class="bg-pink-600 text-white w-12 h-12 rounded-3xl flex items-center justify-center">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    const chatDiv = document.getElementById('chat');
    let history = [];

    function addMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `<div class="${isUser ? 'bg-pink-600 text-white' : 'bg-white border'} max-w-[85%] rounded-3xl px-4 py-3">${text}</div>`;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = "";
      history.push({ role: "user", content: text });

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        if (data.reply) {
          addMessage(data.reply);
          history.push({ role: "assistant", content: data.reply });
        }
      } catch (e) {
        addMessage("Sorry, I'm having trouble connecting.");
      }
    }

    function quickReply(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    }

    async function quickAction(type) {
      if (type === 'book') {
        addMessage("Great! Let me check Lana's availability for you 💇‍♀️", false);
        // Gọi API lấy slot
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: history, action: "get_slots" })
          });
          addMessage("Please tell me your preferred service and date/time, I'll help book it!", false);
        } catch(e) {}
      }
    }

    window.onload = () => {
      addMessage(`Hi! I'm Lana's AI assistant 💇‍♀️<br>How can I help you today?`, false);
    };
  </script>
</body>
</html>
